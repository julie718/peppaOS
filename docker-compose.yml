# MayOS Docker Compose
#
# 启动:
#   docker compose up -d
#   → http://qweasd.top:3000  (HTTP 直连)
#   → https://qweasd.top      (HTTPS via Caddy)

services:
  mayos:
    build: .
    container_name: mayos
    ports:
      - "3000:3000"
    environment:
      PORT: 3000
      HOST: 0.0.0.0
      NODE_ENV: production
      # LLM
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      DASHSCOPE_API_KEY: ${DASHSCOPE_API_KEY:-}
      # STT
      DEEPGRAM_API_KEY: ${DEEPGRAM_API_KEY:-}
      # TTS
      DOUBAO_SPEECH_KEY: ${DOUBAO_SPEECH_KEY:-}
      # Auth
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      PEPPA_PASSWORD: ${PEPPA_PASSWORD:-peppa_2026}
    volumes:
      - mayos_data:/app/data
    restart: unless-stopped

  caddy:
    image: caddy:2-alpine
    container_name: caddy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
    restart: unless-stopped

volumes:
  mayos_data:
  caddy_data:
